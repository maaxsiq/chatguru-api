version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: chatguru-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: chatguru
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: chatguru-redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: chatguru-api
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

  worker:
    build: .
    container_name: chatguru-worker
    command: node dist/worker.js
    depends_on:
      - postgres
      - redis
    env_file:
      - .env

volumes:
  postgres_data:
